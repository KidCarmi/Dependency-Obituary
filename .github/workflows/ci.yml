name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: TypeScript strict check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests
        run: npm run test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          # Check for common secret patterns
          FOUND=0
          for pattern in "ghp_[A-Za-z0-9]" "sk_live_" "sk_test_" "AKIA[A-Z0-9]" "password\s*=\s*['\"][^'\"]+['\"]"; do
            MATCHES=$(grep -rn "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . \
              --exclude-dir=node_modules --exclude-dir=.next --exclude=package-lock.json || true)
            if [ -n "$MATCHES" ]; then
              echo "POTENTIAL SECRET FOUND for pattern: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Potential hardcoded secrets detected. Review the output above."
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Check for env var leaks in client code
        run: |
          echo "Checking for process.env in client components..."
          FOUND=0
          for f in $(grep -rl "use client" app/ --include="*.tsx" --include="*.ts" 2>/dev/null || true); do
            ENVS=$(grep -n "process\.env" "$f" || true)
            if [ -n "$ENVS" ]; then
              # Allow NEXT_PUBLIC_ vars in client code
              NON_PUBLIC=$(echo "$ENVS" | grep -v "NEXT_PUBLIC_" || true)
              if [ -n "$NON_PUBLIC" ]; then
                echo "SERVER ENV VAR IN CLIENT CODE: $f"
                echo "$NON_PUBLIC"
                FOUND=1
              fi
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Server environment variables exposed in client code."
            exit 1
          fi
          echo "No env var leaks found."

      - name: Check .gitignore covers sensitive files
        run: |
          echo "Verifying .gitignore protections..."
          for f in ".env" ".env.local"; do
            if git check-ignore -q "$f" 2>/dev/null; then
              echo "$f: IGNORED ✓"
            else
              echo "::error::$f is NOT in .gitignore!"
              exit 1
            fi
          done
          echo "All sensitive files are gitignored."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    env:
      GITHUB_TOKEN: fake_token_for_build
      UPSTASH_REDIS_REST_URL: https://fake.upstash.io
      UPSTASH_REDIS_REST_TOKEN: fake_token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
