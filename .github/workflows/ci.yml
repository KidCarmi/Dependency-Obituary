name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: TypeScript strict check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  test:
    name: Tests (144)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run tests
        run: npm run test

  # ─── SCA: Software Composition Analysis ────────────────────────────────
  sca:
    name: SCA - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  # ─── Gitleaks: Secret Detection ─────────────────────────────────────────
  gitleaks:
    name: Gitleaks - Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.27.2_linux_x64.tar.gz | tar xz
          chmod +x gitleaks
      - name: Run Gitleaks
        run: ./gitleaks detect --source=. --verbose --no-git

  # ─── CodeQL: SAST ──────────────────────────────────────────────────────
  codeql:
    name: CodeQL - SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ─── Custom Security Checks ────────────────────────────────────────────
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          for pattern in "ghp_[A-Za-z0-9]{36}" "sk_live_" "sk_test_" "AKIA[A-Z0-9]{16}" "-----BEGIN.*PRIVATE KEY-----"; do
            MATCHES=$(grep -rn "$pattern" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" . \
              --exclude-dir=node_modules --exclude-dir=.next --exclude=package-lock.json --exclude=.env.example || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::POTENTIAL SECRET for pattern: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No hardcoded secrets found. ✓"

      - name: Check for env var leaks in client code
        run: |
          echo "Scanning client components for server env vars..."
          FOUND=0
          for f in $(grep -rl '"use client"' app/ --include="*.tsx" --include="*.ts" 2>/dev/null || true); do
            ENVS=$(grep -n "process\.env" "$f" | grep -v "NEXT_PUBLIC_" || true)
            if [ -n "$ENVS" ]; then
              echo "::error::Server env var in client code: $f"
              echo "$ENVS"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No env var leaks found. ✓"

      - name: Verify .gitignore protects secrets
        run: |
          for f in ".env" ".env.local"; do
            if git check-ignore -q "$f" 2>/dev/null; then
              echo "$f: IGNORED ✓"
            else
              echo "::error::$f is NOT in .gitignore!"
              exit 1
            fi
          done

      - name: Check for dangerous patterns
        run: |
          echo "Scanning for dangerous code patterns..."
          FOUND=0
          # Check for eval, innerHTML, dangerouslySetInnerHTML
          for pattern in "eval(" "new Function(" "dangerouslySetInnerHTML" "\.innerHTML\s*="; do
            MATCHES=$(grep -rn "$pattern" --include="*.ts" --include="*.tsx" app/ lib/ \
              --exclude-dir=node_modules || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Dangerous pattern found: $pattern"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Review dangerous patterns above. These may be intentional."
          else
            echo "No dangerous patterns found. ✓"
          fi

  # ─── Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, sca, security-checks]
    env:
      GITHUB_TOKEN: fake_token_for_build
      UPSTASH_REDIS_REST_URL: https://fake.upstash.io
      UPSTASH_REDIS_REST_TOKEN: fake_token
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
